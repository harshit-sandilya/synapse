# ----------------------------------------
# Application
# ----------------------------------------
spring.application.name=transport 
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ----------------------------------------
# Server
# ----------------------------------------
server.port=${SERVER_PORT:8080}
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# ----------------------------------------
# Database
# ----------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----------------------------------------
# JPA/Hibernate
# ----------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ----------------------------------------
# Redis
# ----------------------------------------
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}

# ----------------------------------------
# MinIO
# ----------------------------------------
minio.endpoint=${MINIO_ENDPOINT}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket=${MINIO_BUCKET}

# ----------------------------------------
# Queue Config
# ----------------------------------------
infra.queue.action-queue-prefix=${ACTION_QUEUE_PREFIX:synapse:jobs}

# ----------------------------------------
# CORS
# ----------------------------------------
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# ----------------------------------------
# Logging
# ----------------------------------------
logging.level.com.synapse.transport=DEBUG
logging.level.org.springframework.security=INFO

# ----------------------------------------
# Uploads
# ----------------------------------------
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ----------------------------------------
# Storage
# ----------------------------------------
infra.storage.presigned-url-expiry-minutes=60